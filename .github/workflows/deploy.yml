name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master          # production deploys
  workflow_dispatch:    # allow manual trigger from the Actions tab
  schedule:
    - cron: '0 10 * * 1'   # every Monday at 5am ET (10:00 UTC)

# Required permissions for the deploy-pages action
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; in-progress deploys are not cancelled
# so a push mid-deploy doesn't leave the site in a broken state
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      # ── Main site ───────────────────────────────────────────────────────
      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npm run build

      # ── Tarot app ───────────────────────────────────────────────────────
      - name: Install Tarot dependencies
        working-directory: tarot/app
        run: npm install

      - name: Build Tarot
        working-directory: tarot/app
        run: npm run build
        env:
          VITE_WORKER_URL: ${{ secrets.VITE_WORKER_URL }}

      # Merge tarot/app/dist into the site output so both ship together
      - name: Merge Tarot build into site dist
        run: cp -r tarot/app/dist/. site/dist/tarot/

      # Uploads site/dist/ as the artifact that the deploy job will publish
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
